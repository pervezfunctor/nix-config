# Generated by Home Manager.
# See https://sw.kovidgoyal.net/kitty/conf.html
# Shell integration is sourced and configured manually

shell_integration no-rc
confirm_os_window_close 0
background_opacity 0.8
background_blur 1
font_family JetBrainsMono Nerd Font
font_size 12
hide_window_decorations yes
window_padding_width 6
remember_window_size no

# Include DMS or noctalia(following) in local.conf
# include $HOME/.config/kitty/dank-theme.conf
# include $HOME/.config/kitty/dank-tabs.conf
# include $HOME/.config/kitty/themes/noctalia.conf

include $HOME/.config/kitty/local.conf
