# More option see https://github.com/DreamMaoMao/mango/wiki/

monitorrule=name:HDMI-A-1,scale:1.6,x:0,y:0,width:3840,height:2160,refresh:60
monitorrule=name:HDMI-A-2,scale:1.6,x:0,y:0,width:3840,height:2160,refresh:60
monitorrule=name:DP-1,scale:1.6,x:0,y:0,width:3840,height:2160,refresh:60
monitorrule=name:DP-2,scale:1.6,x:0,y:0,width:3840,height:2160,refresh:60
monitorrule=name:eDP-1,scale:1.6,x:0,y:0,width:3840,height:2160,refresh:60

blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 0-horizontal,1-verticalS
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.33,0.5,0.66

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=5

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=0
# inhibit_regardless_of_visibility=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us
xkb_rules_options=caps:ctrl_modifier

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4

# rootcolor=0x201b14ff
# bordercolor=0x444444ff
# focuscolor=0xc9b890ff
# maximizescreencolor=0x89aa61ff
# urgentcolor=0xad401fff
# scratchpadcolor=0x516c93ff
# globalcolor=0xb153a7ff
# overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:grid
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:center_tile
tagrule=id:5,layout_name:right_tile
tagrule=id:6,layout_name:vertical_scroller
tagrule=id:7,layout_name:vertical_tile
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+SHIFT,c,reload_config
bind=SUPER,Return,spawn,kitty

# exit
bind=SUPER+SHIFT,q,quit
bind=SUPER,q,killclient

# switch window focus
bind=ALT,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,Tab,toggleoverview,
bind=SUPER,backslash,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,
bind=SUPER,r,switch_proportion_preset,
bind=SUPER,c,centerwin,

# switch layout
bind=SUPER,n,switch_layout
bind=SUPER+CTRL,g,setlayout,grid
bind=SUPER+CTRL+SHIFT,g,setlayout,vertical_grid
bind=SUPER+CTRL,t,setlayout,tile
bind=SUPER+CTRL,r,setlayout,right_tile
bind=SUPER+CTRL,c,setlayout,center_tile
bind=SUPER+CTRL,s,setlayout,scroller
bind=SUPER+CTRL,m,setlayout,monocle
bind=SUPER+CTRL+SHIFT,s,setlayout,vertical_scroller

# tag switch
bind=CTRL+SUPER,Left,viewtoleft,0
bind=CTRL+SUPER,Right,viewtoright,0
bind=CTRL+SHIFT+SUPER,Left,tagtoleft,0
bind=CTRL+SHIFT+SUPER,Right,tagtoright,0
bind=CTRL+SUPER,Up,viewtoleft,0
bind=CTRL+SUPER,Down,viewtoright,0
bind=CTRL+SHIFT+SUPER,Up,tagtoleft,0
bind=CTRL+SHIFT+SUPER,Down,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=SUPER+Alt,1,tagsilent,1
bind=SUPER+Alt,2,tagsilent,2
bind=SUPER+Alt,3,tagsilent,3
bind=SUPER+Alt,4,tagsilent,4
bind=SUPER+Alt,5,tagsilent,5
bind=SUPER+Alt,6,tagsilent,6
bind=SUPER+Alt,7,tagsilent,7
bind=SUPER+Alt,8,tagsilent,8
bind=SUPER+Alt,9,tagsilent,9

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# gaps
bind=SUPER+SHIFT,X,incgaps,5
bind=SUPER+SHIFT,Z,incgaps,-5
bind=SUPER+SHIFT,R,togglegaps

# movewin
bind=SUPER+CTRL+ALT+SHIFT,Up,movewin,+0,-50
bind=SUPER+CTRL+ALT+SHIFT,Down,movewin,+0,+50
bind=SUPER+CTRL+ALT+SHIFT,Left,movewin,-50,+0
bind=SUPER+CTRL+ALT+SHIFT,Right,movewin,+50,+0

# resizewin
bind=SUPER+ALT,Up,resizewin,+0,-50
bind=SUPER+ALT,Down,resizewin,+0,+50
bind=SUPER+ALT,Left,resizewin,-50,+0
bind=SUPER+ALT,Right,resizewin,+50,+0
bind=SUPER,minus,resizewin,-25,-25
bind=SUPER,equal,resizewin,+25,+25

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Application Launchers
bind=SUPER,d,spawn,dms ipc call spotlight toggle
bind=SUPER,v,spawn,dms ipc call clipboard toggle
bind=SUPER,m,spawn,dms ipc call processlist focusOrToggle
bind=SUPER+SHIFT,n,spawn,dms ipc call notifications toggle
bind=SUPER,y,spawn,dms ipc call dankdash wallpaper
bind=SUPER,space,spawn,dms ipc call spotlight toggle
bind=SUPER,comma,spawn,dms ipc call settings focusOrToggle

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
# Disable animation on DMS layers
layerrule=noanim:1,layer_name:^dms

# GNOME apps
windowrule=isnoborder:1,appid:^org\.gnome\.

env=QT_QPA_PLATFORM,wayland
env=ELECTRON_OZONE_PLATFORM_HINT,auto
env=QT_QPA_PLATFORMTHEME,gtk3

bind=SUPER+ALT,c,spawn,noctalia-shell ipc call controlCenter toggle
bind=SUPER+ALT,l,spawn,noctalia-shell ipc call lockScreen lock
bind=SUPER,d,spawn,noctalia-shell ipc call launcher toggle
bind=SUPER,space,spawn,rofi -show drun -modi drun

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots
exec-once=systemctl --user start mango-session.target
exec-once=wl-paste --watch cliphist store
exec-once=noctalia-shell
# exec-once=~/nix-config/scripts/idle

# env=GTK_IM_MODULE,fcitx
# env=QT_IM_MODULE,fcitx
# env=SDL_IM_MODULE,fcitx
# env=XMODIFIERS,@im=fcitx
# env=GLFW_IM_MODULE,ibus

source=~/.config/mango/noctalia.conf
source=~/.config/mango/local.conf
